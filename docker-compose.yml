services:
  web-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: presta-mesta-web-dev
    ports:
      - "4200:4200"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - WATCHPACK_POLLING=true
      - CHOKIDAR_USEPOLLING=true
    restart: unless-stopped